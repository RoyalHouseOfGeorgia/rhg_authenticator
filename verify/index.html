<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP: connect-src must match PRODUCTION_HOSTNAME in src/verify-page.ts -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; connect-src 'self' https://verify.royalhouseofgeorgia.ge; base-uri 'none'; form-action 'none'">
  <!--
    REQUIRED: The production server MUST set these HTTP response headers.
    GitHub Pages sets X-Content-Type-Options: nosniff by default.
    For HSTS preload and frame-ancestors, configure via the hosting provider
    or use a CDN/proxy (e.g., Cloudflare) that supports custom headers.

    Content-Security-Policy: frame-ancestors 'none'
      (meta tag CSP ignores frame-ancestors per W3C spec — server header required)
    Strict-Transport-Security: max-age=31536000; includeSubDomains; preload
    X-Content-Type-Options: nosniff
    X-Frame-Options: DENY
  -->
  <meta name="referrer" content="no-referrer">
  <title>Royal House of Georgia — Credential Verification</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="icon" href="favicon.ico" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="royal-arms-120.png" alt="Royal Arms of Georgia" class="header-crest" width="120" height="120">
    <h1 class="header-georgian" lang="ka">საქართველოს სამეფო სახლი</h1>
    <p class="header-english">Royal House of Georgia</p>
    <p class="subtitle">Digital Credential Verification</p>
  </header>
  <main id="result" aria-live="polite">
    <!-- Populated by JS -->
    <div class="loading" role="status">Verifying credential…</div>
  </main>
  <noscript>
    <div class="error-banner">
      <p>JavaScript is required to verify credentials.</p>
    </div>
  </noscript>
  <footer>
    <p>&copy; 2026 <a href="https://royalhouseofgeorgia.ge">Royal House of Georgia</a></p>
  </footer>
  <script src="verify.js" integrity="sha384-ABCPo7e8Gwvuww/BwDJBlL+2An/7DL/ha901/ckp3pqb3d509RheuhilZTfuIdl2" crossorigin="anonymous"></script>
</body>
</html>
