name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check test vectors are in sync
        run: diff go/testdata/vectors.json src/__tests__/fixtures/vectors.json
      - run: npm run lint
      - run: npm test
      - name: Verify verify.js SRI hash
        run: |
          npm run build:verify
          HASH=$(cat verify/verify.js | openssl dgst -sha384 -binary | openssl base64 -A)
          grep -q "sha384-$HASH" verify/index.html || (echo "SRI hash mismatch — rebuild verify.js and update index.html" && exit 1)
      - run: npm audit --audit-level=high

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: github/codeql-action/init@820e3160e279568db735cee8ed8f8e77a6da7818  # v3.32.6
        with:
          languages: go, javascript
      - run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev libgl1-mesa-dev xorg-dev
      - uses: github/codeql-action/autobuild@820e3160e279568db735cee8ed8f8e77a6da7818  # v3.32.6
      - uses: github/codeql-action/analyze@820e3160e279568db735cee8ed8f8e77a6da7818  # v3.32.6

  build:
    needs: [test-typescript, security]
    strategy:
      matrix:
        include:
          - os: macos-latest
            suffix: darwin-arm64
          - os: windows-latest
            suffix: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.25.8'
          cache-dependency-path: go/go.sum
      - working-directory: go
        run: go mod verify
      - working-directory: go
        run: go vet ./...
      - working-directory: go
        run: go test ./... -count=1
      - working-directory: go
        run: go run golang.org/x/vuln/cmd/govulncheck ./...
      - name: Run gitleaks
        if: runner.os != 'Windows'
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - if: runner.os == 'Windows'
        working-directory: go
        run: go build -trimpath -ldflags "-s -w -H windowsgui" -o ../release/rhg-authenticator-${{ matrix.suffix }}.exe .
      - if: runner.os != 'Windows'
        working-directory: go
        run: go build -trimpath -ldflags "-s -w" -o ../release/rhg-authenticator-${{ matrix.suffix }} .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: rhg-authenticator-${{ matrix.suffix }}
          path: release/rhg-authenticator-${{ matrix.suffix }}*
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    # id-token and attestations needed only by attest-build-provenance step,
    # but GitHub Actions requires job-level permissions. All actions are SHA-pinned.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: release
          merge-multiple: true
      - run: cd release && shasum -a 256 rhg-authenticator-* > SHA256SUMS.txt
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          subject-path: 'release/*'
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          files: release/*
          generate_release_notes: true
