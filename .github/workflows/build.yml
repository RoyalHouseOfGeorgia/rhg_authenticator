name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']  # paths-ignore does not apply to tag pushes
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.reqs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.reqs/**'

# Deduplicate: when a tag push and branch push fire simultaneously,
# each event type gets its own group so a release run is never cancelled
# by a concurrent branch run.
concurrency:
  group: build-${{ github.sha }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: '1.25.8'
  NODE_VERSION: '20'

jobs:
  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Check test vectors are in sync
        run: diff go/testdata/vectors.json src/__tests__/fixtures/vectors.json
      - run: npm run lint
      - run: npm test
      - name: Verify verify.js SRI hash
        run: |
          set -euo pipefail
          npm run build:verify
          HASH=$(openssl dgst -sha384 -binary < verify/verify.js | openssl base64 -A)
          grep -q "sha384-$HASH" verify/index.html || (echo "SRI hash mismatch — rebuild verify.js and update index.html" && exit 1)
      - run: npm audit --audit-level=moderate

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1
        with:
          languages: go, javascript
      - run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev libgl1-mesa-dev xorg-dev
      - uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1
      - uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13  # v4.35.1

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Required by gitleaks-action for API access

  # Race detection on macOS only. Windows excluded: -race requires
  # CGO_ENABLED=1 and a C compiler not available on windows-latest runners.
  test-race:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go/go.sum
      - name: Toolchain versions
        run: uname -m && sw_vers && xcodebuild -version && go version
      - working-directory: go
        run: go test -race ./... -count=1

  build:
    needs: [test-typescript, test-race]
    strategy:
      matrix:
        include:
          - os: macos-26
            suffix: darwin-arm64
          - os: windows-latest
            suffix: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go/go.sum
      - name: Toolchain versions (macOS)
        if: runner.os == 'macOS'
        run: uname -m && sw_vers && xcodebuild -version && go version
      - name: Toolchain versions (Windows)
        if: runner.os == 'Windows'
        run: go version
      - working-directory: go
        run: go mod verify
      - working-directory: go
        run: go vet ./...
      - name: Go tests
        if: runner.os == 'Windows'
        working-directory: go
        run: go test ./... -count=1
      - name: govulncheck
        working-directory: go
        run: go tool govulncheck ./...
      - if: runner.os == 'Windows'
        working-directory: go
        run: go build -trimpath -ldflags "-s -w -H windowsgui" -o ../release/rhg-authenticator-${{ matrix.suffix }}.exe .
      - if: runner.os != 'Windows'
        working-directory: go
        run: go build -trimpath -ldflags "-s -w" -o ../release/rhg-authenticator-${{ matrix.suffix }} .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: rhg-authenticator-${{ matrix.suffix }}
          path: release/rhg-authenticator-${{ matrix.suffix }}*
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, security, gitleaks]
    runs-on: ubuntu-latest
    # id-token and attestations needed only by attest-build-provenance step,
    # but GitHub Actions requires job-level permissions. All actions are SHA-pinned;
    # a compromised action would require a commit-SHA collision to execute.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: release
          merge-multiple: true
      # SHA256SUMS for convenience; SLSA provenance attestation below provides
      # stronger integrity verification than GPG-signed checksums.
      - run: cd release && sha256sum rhg-authenticator-* > SHA256SUMS.txt
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          subject-path: 'release/*'
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          files: release/*
          generate_release_notes: true
